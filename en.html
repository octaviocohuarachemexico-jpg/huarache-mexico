<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Huarache Mexico</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    nav {
      text-align: center;
      padding: 10px;
      background: #eee;
    }

    nav a {
      margin: 10px;
      text-decoration: none;
      color: black;
    }

    .products {
      display: flex;
      gap: 20px;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 300px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      background: #fff;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      background: #c49a6c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Huarache Mexico</h1>
  <p>Handcrafted huaraches made by Mexican artisans</p>
</header>

<nav>
  <a href="#products">Products</a>
  <a href="#contact">Contact</a>
</nav>

<section id="products" class="section">
  <h2>Products</h2>

  <div class="products">

    <div class="card">
      <img src="images/classic-black.jpg">
      <h3>Black</h3>
      <a href="#contact" class="btn">Contact</a>
    </div>

    <div class="card">
      <img src="images/classic-brown.jpg">
      <h3>Brown</h3>
      <a href="#contact" class="btn">Contact</a>
    </div>

    <div class="card">
      <img src="images/classic-pink.jpg">
      <h3>Pink</h3>
      <a href="#contact" class="btn">Contact</a>
    </div>

  </div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>

  <form action="https://formsubmit.co/octavio.co.huarachemexico@gmail.com" method="POST">

    <input type="hidden" name="_autoresponse" value="Thank you for your message! We will contact you soon.">

    <p>
      <input type="text" name="name" placeholder="Your Name" required>
    </p>

    <p>
      <input type="email" name="email" placeholder="Email Address" required>
    </p>

    <p>
      <textarea name="message" placeholder="Message"></textarea>
    </p>

    <p>
      <button type="submit">Send</button>
    </p>
    
  </form>
</section>

</body>
</html>
