<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Huarache Mexico | 手作りワラチェ専門店</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 手書き風フォント（Google Fonts） -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

    <style>
    body {
      font-family: "Playfair Display", serif;
      margin: 0;
      color: #222;
      background-color: #ffffff;
    }

            /* パペルピカド風バナー（シンプル・カラフル） */
        .papel {
      height: 8px; /* ほぼ見えないラインに */
      background: #eaeaea;
    }

    header {
      background: #ffffff;
      color: #222;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

        header h1 {
      letter-spacing: 0.1em;
      font-size: 2.8rem;
      font-family: "Playfair Display", serif;
      font-weight: 500;
    }

    nav {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.8rem;
      border-bottom: 1px solid #eee;
    }
        nav a {
      text-decoration: none;
      color: #444;
      font-weight: 400;
      font-family: "Playfair Display", serif;
      font-size: 0.95rem;
    }

    .hero {
      padding: 4rem 1rem;
      text-align: center;
      background: #ffffff;
    }

        .hero::before { display:none; }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background-color: #222;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .section {
      padding: 3rem 1rem;
      max-width: 1000px;
      margin: auto;
    }

        .section h2 {
      border-bottom: 1px solid #ddd;
      display: inline-block;
      padding-bottom: 0.3rem;
      margin-bottom: 1.5rem;
      font-family: "Playfair Display", serif;
      font-size: 1.5rem;
      font-weight: 500;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* PCでは必ず3列 */
      gap: 1.5rem;
    }

    /* タブレット以下は2列 */
    @media (max-width: 900px) {
      .products {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* スマホは1列 */
    @media (max-width: 500px) {
      .products {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      padding: 1.5rem;
      text-align: center;
      position: relative;
    }

    /* シンプルなメキシコカラーストライプ（元デザイン） */
    .card::before { display:none; }

    .card img {
      width: 100%;
      max-height: 140px; /* 少し大きく、でも横並びを崩さない */
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 0.8rem;
    }

    footer {
      background-color: #ffffff;
      color: #888;
      text-align: center;
      padding: 2rem 1rem;
      margin-top: 3rem;
      border-top: 1px solid #eee;
    }
    /* 全要素フォント統一 */
    * {
      font-family: "Playfair Display", serif;
    }
  </style>
</head>
<body>

  <header style="text-align:center; padding:3rem 1rem; border-bottom:1px solid #eee; background:#fff;">
    <h1 style="font-family: 'Playfair Display', serif; font-size:2.2rem; letter-spacing:0.1em;">Thank you</h1>
  </header>

  <section style="max-width:700px; margin:4rem auto; text-align:center; padding:0 1rem;">
    <p style="color:#555; font-size:1rem; margin-bottom:2rem;">
      Your message has been sent successfully.
    </p>

    <a href="index.html" style="display:inline-block; padding:0.6rem 1.2rem; background:#222; color:#fff; text-decoration:none; border-radius:4px; font-size:0.9rem;">
      Back to Home
    </a>
  </section>

  <footer style="text-align:center; padding:2rem; color:#888; border-top:1px solid #eee; margin-top:3rem; background:#fff;">
    <p>&copy; 2026 Huarache Mexico</p>
  </footer>

</body>
</html>
